<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EASY INC.</title>
    <script>
      // GitHub Pages SPA リダイレクト (クエリパラメータ方式)
      // パスとクエリを ?p=/team&q=foo の形にエンコードして index.html へ転送する
      var l = window.location;
      var segmentCount = 1; // basename のセグメント数 (/easy-inc = 1)
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?p=/' + l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
